# VM3 — Serveur Base de données (MySQL)
# Situé dans le LAN privé — jamais accessible depuis Internet
# Seule la VM2 peut le contacter sur le port 3306
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-db
  namespace: openshift-3tiers
  labels:
    app: mysql
spec:
  running: true
  template:
    metadata:
      labels:
        app: mysql
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
          interfaces:
            - name: lan
              bridge: {}           # Connectée uniquement au LAN privé
      networks:
        - name: lan
          multus:
            networkName: lan-network   # NAD créé dans 02-nad-lan.yaml
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm-db
              packages:
                - mysql-server     # Serveur MySQL
              runcmd:
                - systemctl enable mysql        # MySQL démarre automatiquement
                - systemctl start mysql         # MySQL démarre immédiatement
                - mysql -e "CREATE DATABASE appdb;"
                - mysql -e "CREATE USER 'appuser'@'%' IDENTIFIED BY 'apppassword123';"
                - mysql -e "GRANT ALL PRIVILEGES ON appdb.* TO 'appuser'@'%';"
                - mysql -e "FLUSH PRIVILEGES;"  # Applique les droits immédiatement
      terminationGracePeriodSeconds: 0
