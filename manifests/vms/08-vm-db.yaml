# VM3 — Serveur Base de données (MySQL)
# Connectée uniquement au réseau LAN (192.168.10.0/24)
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-db
  namespace: bienvenucloud-dev
  labels:
    app: mysql
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app: mysql
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
            - name: lan
              bridge: {}           # Interface LAN uniquement
      networks:
        - name: default
          pod: {}
        - name: lan
          multus:
            networkName: k8s.ovn.org/lan-network    # UDN LAN
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm-db
              user: cloud-user
              password: openshift123
              chpasswd: {expire: False}
              runcmd:
                - apt-get update -y && apt-get install -y mysql-server
                - systemctl enable mysql && systemctl start mysql
                - ip addr add 192.168.10.10/24 dev eth1
                - ip link set eth1 up
                - mysql -e "CREATE DATABASE appdb;"
                - mysql -e "CREATE USER 'appuser'@'%' IDENTIFIED BY 'apppassword123';"
                - mysql -e "GRANT ALL PRIVILEGES ON appdb.* TO 'appuser'@'%';"
                - mysql -e "FLUSH PRIVILEGES;"
      terminationGracePeriodSeconds: 0
