# Deployment OpenShift pour le Serveur Web (Tier 2)
# Simule un serveur web avec Nginx dans la zone DMZ
# Reçoit les requêtes HTTP depuis Internet via le firewall
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: bienvenucloud-dev
  labels:
    app: web                      # Label identifiant ce tier
spec:
  replicas: 1                     # Une seule instance du serveur web
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:latest     # Image Nginx officielle — prête à l'emploi
          ports:
            - containerPort: 80   # Port HTTP standard
