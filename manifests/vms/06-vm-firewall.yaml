# VM1 — Passerelle/Firewall
# Point d'entrée unique depuis Internet — filtre tout le trafic avec iptables
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-firewall
  namespace: bienvenucloud-dev
  labels:
    app: firewall
spec:
  running: true
  template:
    metadata:
      labels:
        app: firewall
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
            - name: dmz
              bridge: {}
            - name: lan
              bridge: {}
      networks:
        - name: default
          pod: {}
        - name: dmz
          multus:
            networkName: dmz-network
        - name: lan
          multus:
            networkName: lan-network
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm-firewall
              packages:
                - iptables
                - iptables-persistent
              runcmd:
                - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
                - sysctl -p
                - iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
                - iptables -A FORWARD -m state --state RELATED,ESTABLISHED -j ACCEPT
                - iptables -A FORWARD -i eth0 -o eth1 -p tcp --dport 80 -j ACCEPT
                - iptables -A FORWARD -i eth1 -o eth2 -p tcp --dport 3306 -j ACCEPT
                - iptables -A FORWARD -j DROP
                - netfilter-persistent save
      terminationGracePeriodSeconds: 0
