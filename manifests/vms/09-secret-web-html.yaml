# Secret contenant la page HTML du serveur web
# Utilisé car cloud-init limite à 2048 bytes
apiVersion: v1
kind: Secret
metadata:
  name: web-html-secret
  namespace: bienvenucloud-dev
type: Opaque
stringData:
  userdata: |
    #cloud-config
    hostname: vm-web
    user: cloud-user
    password: openshift123
    chpasswd: { expire: False }
    packages:
      - nginx
    runcmd:
      - apt-get update -y
      - apt-get install -y nginx
      - systemctl enable nginx
      - systemctl start nginx
      - echo '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Architecture 3-Tiers OpenShift</title><style>body{font-family:Arial;background:#0a0a1a;color:#fff;margin:0}header{background:linear-gradient(135deg,#1a1a3e,#e00);padding:40px;text-align:center}h1{font-size:2.5em}.status{background:#111;padding:15px;text-align:center;border-bottom:2px solid #e00}.status span{color:#00ff88;margin:0 20px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1100px;margin:40px auto;padding:0 20px}.card{background:#111;border:1px solid #333;border-radius:10px;padding:25px;text-align:center}.icon{font-size:3em}.card h3{color:#e00;margin:10px 0}.badge{background:#00ff88;color:#000;padding:3px 10px;border-radius:20px;font-size:.8em}footer{background:#111;text-align:center;padding:20px;color:#555;border-top:2px solid #e00}</style></head><body><header><h1>Architecture 3-Tiers sur OpenShift</h1><p>Deployee sur Red Hat OpenShift Service on AWS</p></header><div class="status"><span>Firewall: RUNNING</span><span>Web: RUNNING</span><span>Database: RUNNING</span></div><div class="cards"><div class="card"><div class="icon">Shield</div><h3>Tier 1 Firewall</h3><p>Ubuntu 22.04 + iptables</p><span class="badge">VM KubeVirt</span></div><div class="card"><div class="icon">Web</div><h3>Tier 2 Serveur Web</h3><p>Ubuntu 22.04 + Nginx</p><span class="badge">VM KubeVirt</span></div><div class="card"><div class="icon">DB</div><h3>Tier 3 Base de donnees</h3><p>MySQL 8.0</p><span class="badge">Deployment</span></div></div><footer><p>Projet realise par Bienvenu Diatta</p></footer></body></html>' > /var/www/html/index.html
