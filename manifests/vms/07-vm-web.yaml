apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-web
  namespace: openshift-3tiers
  labels:
    app: web
spec:
  running: true
  template:
    metadata:
      labels:
        app: web
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
          interfaces:
            - name: dmz
              bridge: {}
      networks:
        - name: dmz
          multus:
            networkName: dmz-network
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm-web
              packages:
                - nginx
                - nodejs
                - npm
              runcmd:
                - systemctl enable nginx
                - systemctl start nginx
      terminationGracePeriodSeconds: 0
