apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-web
  namespace: bienvenucloud-dev
  labels:
    app: web
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app: web
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 2Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
            - name: dmz
              bridge: {}
      networks:
        - name: default
          pod: {}
        - name: dmz
          multus:
            networkName: bienvenucloud-dev/dmz-network
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm-web
              user: cloud-user
              password: openshift123
              chpasswd: {expire: False}
              packages:
                - nginx
                - nodejs
                - curl
              runcmd:
                - systemctl enable nginx
                - systemctl start nginx
                - ip link set enp2s0 up
                - ip addr add 192.168.100.10/24 dev enp2s0 || true
                - sleep 10
                - curl -fsSL https://raw.githubusercontent.com/bienvenudiatta/openshift-3tiers/main/manifests/vms/index.html -o /var/www/html/index.html || true
                - systemctl restart nginx
                - |
                  cat > /etc/systemd/system/network-dmz.service << 'EOF'
                  [Unit]
                  Description=DMZ Network and Nginx
                  After=network-online.target
                  Wants=network-online.target
                  [Service]
                  Type=oneshot
                  RemainAfterExit=yes
                  ExecStart=/bin/bash -c 'ip link set enp2s0 up; ip addr add 192.168.100.10/24 dev enp2s0 || true; systemctl start nginx'
                  [Install]
                  WantedBy=multi-user.target
                  EOF
                - systemctl enable network-dmz.service
      terminationGracePeriodSeconds: 0
