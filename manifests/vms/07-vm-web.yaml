# VM2 — Serveur Web (Nginx)
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-web
  namespace: bienvenucloud-dev
  labels:
    app: web
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app: web
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm-web
              user: cloud-user
              password: openshift123
              chpasswd: { expire: False }
              packages:
                - nginx
                - nodejs
                - npm
              runcmd:
                - apt-get update -y
                - apt-get install -y nginx
                - systemctl enable nginx
                - systemctl start nginx
                - |
                  cat > /var/www/html/index.html << 'HTMLEOF'
                  <!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Architecture 3-Tiers OpenShift</title><style>body{font-family:Arial;background:#0a0a1a;color:#fff;margin:0}header{background:linear-gradient(135deg,#1a1a3e,#e00);padding:40px;text-align:center}h1{font-size:2.5em}.status{background:#111;padding:15px;text-align:center;border-bottom:2px solid #e00}.status span{color:#00ff88;margin:0 20px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1100px;margin:40px auto;padding:0 20px}.card{background:#111;border:1px solid #333;border-radius:10px;padding:25px;text-align:center}.icon{font-size:3em}.card h3{color:#e00;margin:10px 0}.badge{background:#00ff88;color:#000;padding:3px 10px;border-radius:20px;font-size:.8em}footer{background:#111;text-align:center;padding:20px;color:#555;border-top:2px solid #e00}</style></head><body><header><h1>🚀 Architecture 3-Tiers sur OpenShift</h1><p>Déployée sur Red Hat OpenShift Service on AWS</p></header><div class="status"><span>🟢 Firewall: RUNNING</span><span>🟢 Web: RUNNING</span><span>🟢 Database: RUNNING</span></div><div class="cards"><div class="card"><div class="icon">🛡️</div><h3>Tier 1 — Firewall</h3><p>Ubuntu 22.04 + iptables<br>Filtre le trafic réseau<br>NAT vers Internet</p><span class="badge">VM KubeVirt</span></div><div class="card"><div class="icon">🌐</div><h3>Tier 2 — Serveur Web</h3><p>Ubuntu 22.04 + Nginx<br>Zone DMZ sécurisée<br>Port 80/HTTP</p><span class="badge">VM KubeVirt</span></div><div class="card"><div class="icon">🗄️</div><h3>Tier 3 — Base de données</h3><p>MySQL 8.0<br>Réseau LAN privé<br>Port 3306</p><span class="badge">Deployment</span></div></div><footer><p>Projet réalisé par <span style="color:#e00">Bienvenu Diatta</span> — Administration Cloud & Virtualisation</p></footer></body></html>
                  HTMLEOF
      terminationGracePeriodSeconds: 0
