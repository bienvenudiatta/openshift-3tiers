# VM2 — Serveur Web (Nginx)
# Connectée au réseau DMZ (192.168.100.0/24)
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-web
  namespace: bienvenucloud-dev
  labels:
    app: web
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app: web
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
            - name: dmz
              bridge: {}
      networks:
        - name: default
          pod: {}
        - name: dmz
          multus:
            networkName: bienvenucloud-dev/dmz-network
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm-web
              user: cloud-user
              password: openshift123
              chpasswd: { expire: False }

              runcmd:
                - apt-get update -y && apt-get install -y nginx --no-install-recommends
                - systemctl enable nginx && systemctl start nginx

                # Activer interface DMZ
                - ip link set enp2s0 up

                # Config IP
                - ip addr add 192.168.100.10/24 dev enp2s0

                # Route vers firewall
                - ip route add default via 192.168.100.1

                # Page web
                - curl -fsSL https://raw.githubusercontent.com/bienvenudiatta/openshift-3tiers/main/manifests/vms/index.html -o /var/www/html/index.html

      terminationGracePeriodSeconds: 0
