# Deployment OpenShift pour le Firewall (Tier 1)
# Simule une passerelle/firewall avec Ubuntu + iptables
# Filtre le trafic entre Internet, la DMZ et le LAN
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firewall
  namespace: bienvenucloud-dev
  labels:
    app: firewall                 # Label identifiant ce tier
spec:
  replicas: 1                     # Une seule instance du firewall
  selector:
    matchLabels:
      app: firewall
  template:
    metadata:
      labels:
        app: firewall
    spec:
      containers:
        - name: firewall
          image: ubuntu:22.04     # Même OS qu'avant
          command: ["/bin/bash", "-c"]
          args:
            - |
              apt-get update && apt-get install -y iptables iproute2
              echo 1 > /proc/sys/net/ipv4/ip_forward
              iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
              iptables -A FORWARD -m state --state RELATED,ESTABLISHED -j ACCEPT
              iptables -A FORWARD -i eth0 -o eth1 -p tcp --dport 80 -j ACCEPT
              iptables -A FORWARD -i eth1 -o eth2 -p tcp --dport 3306 -j ACCEPT
              iptables -A FORWARD -j DROP
              tail -f /dev/null   # Garde le conteneur actif
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]  # Nécessaire pour iptables
